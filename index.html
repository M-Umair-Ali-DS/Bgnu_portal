<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGNU Student Portal</title>
    <style>
        /* 🌍 پورے پیج کو سینٹر اور خوبصورت کرنے کے لیے */
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* 📱 مین کنٹینر جو موبائل اسکرین پر بالکل پورا (Full Width) آئے گا */
        .main-wrapper {
            width: 100%;
            max-width: 480px; /* موبائل اسکرین کا معیاری سائز */
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 👤 اوپر والا کارڈ (Hero Section) */
        .hero-section {
            background: linear-gradient(135deg, #a8dadc, #f1faee);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid #e6eff6;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4ac6ed;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .hero-section h1 {
            margin: 5px 0;
            font-size: 24px;
            color: #1d3557;
        }

        .subtitle {
            font-size: 14px;
            color: #457b9d;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            background-color: #e63946;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        /* 📊 نیچے والا کالا ڈیش بورڈ (Dark Dashboard) */
        .dark-dashboard {
            background-color: #121212;
            padding: 25px 20px;
            border-radius: 30px 30px 0 0;
            color: #ffffff;
            flex-grow: 1; /* یہ ڈیش بورڈ کو نیچے تک پورا پھیلا دے گا */
            box-sizing: border-box;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .bgnu-logo {
            font-size: 22px;
            font-weight: bold;
            color: #4ac6ed;
        }

        .online-status {
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background-color: #2ec4b6;
            border-radius: 50%;
            margin-right: 6px;
        }

        /* 💳 اسٹوڈنٹ کارڈ */
        .student-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #4ac6ed;
            margin-right: 15px;
        }

        .student-info h3 {
            margin: 0;
            font-size: 14px;
            color: #ffffff;
        }

        .student-info p {
            margin: 2px 0 0 0;
            font-size: 11px;
            color: #94a3b8;
        }

        /* 📋 رجسٹریشن اور فیس سٹیٹس */
        .status-box {
            background-color: #1e293b;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        /* 🎛️ فور بٹنز گرڈ (4 Buttons Grid) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .grid-item {
            background-color: #1e293b;
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .grid-item img {
            width: 35px;
            height: 35px;
            margin-bottom: 8px;
        }

        .grid-item span {
            display: block;
            font-size: 13px;
        }

        /* 🛑 لاگ آؤٹ بٹن */
        .logout-btn {
            display: block;
            background: linear-gradient(135deg, #bd1f1f, #8b0000);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 📱 مین ریپر جو اسکرین سائز کنٹرول کرے گا -->
    <div class="main-wrapper">

        <!-- حصہ 1: اوپر والا کارڈ -->
        <div class="hero-section">
            <img src="puma.jpeg" alt="Muhammad Umair Faisal" class="logo-img">
            <h1>Muhammad Umair Faisal</h1>
            <div class="subtitle">University Student & Web Developer</div>

            <!-- 📞 کال اور واٹس ایپ کے پکے بٹنز -->
            <div style="margin-bottom: 20px; font-size: 16px; margin-top: 10px;">
                <a href="tel:+923435803243" style="color: #0284c7; text-decoration: none; font-weight: bold; margin-right: 20px;">
                    📞 Call Me
                </a>
                <a href="https://api.whatsapp.com/send?phone=923435803243" target="_blank" style="color: #25D366; text-decoration: none; font-weight: bold;">
                    💬 WhatsApp
                </a>
            </div>

            <a href="about.html" class="btn">View More Info</a>
        </div>

        <!-- حصہ 2: نیا والا بلیک ڈیش بورڈ -->
        <div class="dark-dashboard">
            
            <!-- ہیڈر -->
            <div class="top-header">
                <div class="bgnu-logo">BGNU</div>
                <div class="online-status">
                    <div class="online-dot"></div>
                    Online
                </div>
            </div>

            <!-- اسٹوڈنٹ کارڈ داخلہ انفارمیشن -->
            <div class="student-card">
                <img src="puma.jpeg" alt="Student Pic" class="card-img">
                <div class="student-info">
                    <h3>MUHAMMAD UMAIR FAISAL</h3>
                    <p>BSDSF25E04</p>
                </div>
            </div>

            <!-- رجسٹریشن اور فیس کا ڈبہ -->
            <div class="status-box">
                <div class="status-row">
                    <span style="color: #94a3b8;">Registration No:</span>
                    <span style="font-weight: bold; color: #cbd5e1;">Pending...</span>
                </div>
                <div class="status-row">
                    <span style="color: #94a3b8;">Fee Status:</span>
                    <span style="font-weight: bold; color: #2ec4b6;">PAID</span>
                </div>
            </div>

            <!-- 4 مین بٹنز کی گرڈ -->
            <div class="grid-container">
                <a href="courses.html" class="grid-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" alt="Courses">
                    <span>Courses</span>
                </a>
                <a href="grade.html" class="grid-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/3596/3596093.png" alt="Grade Book">
                    <span>Grade Book</span>
                </a>
                <a href="attendance.html" class="grid-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/3652/3652191.png" alt="Attendance">
                    <span>Attendance</span>
                </a>
                <a href="feedback.html" class="grid-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/2345/2345338.png" alt="Feedback">
                    <span>Feedback</span>
                </a>
            </div>

            <!-- لاگ آؤٹ بٹن -->
            <a href="#" class="logout-btn">Logout</a>

        </div>

    </div> <!-- مین ریپر بند ہوا -->

</body>
</html>
