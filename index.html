        .online-dot {

            height: 12px;

            margin-right: 6px;

        /* یونیورسٹی ایپ جیسا اسٹوڈنٹ کارڈ */
        .student-card {

        .avatar-small {
            width: 55px;

            border-radius: 50%;
            border: 2px solid #4ac6ed;
            margin-right: 15px;

        .student-name {
            font-size: 16px;
            font-weight: bold;
        }
        .student-roll {
            font-size: 13px;
            color: #aaaaaa;
        }

        /* رجسٹریشن پینل */
        .info-panel {
            background-color: #1e3a5f;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }
        .panel-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .panel-row:last-child { margin-bottom: 0; }
        .panel-label { color: #cccccc; }
        .panel-value { font-weight: bold; }

        /* کورسز گریڈ (چار ڈبے) */
        .grid-container {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .grid-tile {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .tile-icon {
            font-size: 26px;
            margin-bottom: 8px;
        }
        .tile-title {
            font-size: 13px;
            font-weight: 500;
        }
