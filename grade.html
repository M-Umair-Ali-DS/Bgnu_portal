<!DOCTYPE html>
<html>
<head>
    <title>Grade Book - BGNU Portal</title>
    <style>
        body { background-color:lightblue ; color: #ffffff; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background-color: #1a1a1a; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); text-align: left; }
        h1 { color: #4ac6ed; text-align: center; }
        .grade-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .grade-table th, .grade-table td { padding: 10px; border-bottom: 1px solid gray; text-align: left; }
        .grade-table th { color: #aaa; }
        .back-btn { display: inline-block; background-color: #0056b3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 Grade Book</h1>
        <p style="color: #aaa; text-align: center;">Current Mid-Term Results</p>
        
        <table class="grade-table">
            <tr><th>Subject</th><th>Marks</th><th>Grade</th></tr>
            <tr><td>ICT</td><td>42/50</td><td style="color: #4caf50;">A</td></tr>
            <tr><td>C++ Programming</td><td>45/50</td><td style="color: #4caf50;">A+</td></tr>
            <tr><td>Ideology Summary</td><td>38/50</td><td style="color: #ff9800;">B</td></tr>
            <tr><td>Calculus</td><td>40/50</td><td style="color: #4caf50;">A</td></tr>
        </table>

        <center><a href="index.html" class="back-btn">Go Back to Dashboard</a></center>
    </div>

</body>
</html>
